services:
  asean-english-hub:
    build: .
    container_name: asean-english-hub
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: ${PORT:-4173}
      DATA_FILE: /app/data/asean-hub.json
    ports:
      - "${PUBLIC_PORT:-4173}:${PORT:-4173}"
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + (process.env.PORT || 4173) + '/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
